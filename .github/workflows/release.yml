name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0) — leave empty to use the tag from the latest commit"
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build – ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos apple silicon
          - os: macos-latest
            label: macOS
            args: "--target aarch64-apple-darwin"
          - os: windows-latest
            label: Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Resolve version tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: K Card ${{ steps.tag.outputs.value }}
          releaseBody: |
            ## K Card ${{ github.ref_name }}

            ### Downloads
            | Platform | Installer |
            |----------|-----------|
            | macOS    | `.dmg`    |
            | Windows  | `.msi` or `.exe` |
            | Linux    | `.AppImage` or `.deb` |

            > On macOS: right-click → Open if Gatekeeper blocks the app.
            > On Windows: click "More info → Run anyway" on the SmartScreen prompt.
          releaseDraft: false
          prerelease: false
