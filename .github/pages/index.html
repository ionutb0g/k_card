<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K Card – Download</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.375rem;
    }

    .version {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    .version span {
      background: #f1f5f9;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-weight: 600;
    }

    .platforms {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .platform {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .platform:hover {
      border-color: #3b82f6;
      background: #f8fafc;
    }

    .platform-info {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }

    .platform-icon {
      font-size: 1.5rem;
      width: 2rem;
      text-align: center;
    }

    .platform-name {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .platform-ext {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.1rem;
    }

    .download-icon {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    .note {
      font-size: 0.8rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .note strong {
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>K Card</h1>
    <p class="version">Latest release: <span id="version">loading…</span></p>

    <div class="platforms">
      <a class="platform" id="link-mac" href="#" target="_blank" rel="noopener">
        <div class="platform-info">
          <span class="platform-icon">🍎</span>
          <div>
            <div class="platform-name">macOS</div>
            <div class="platform-ext">.dmg · Universal</div>
          </div>
        </div>
        <span class="download-icon">↓</span>
      </a>

      <a class="platform" id="link-win" href="#" target="_blank" rel="noopener">
        <div class="platform-info">
          <span class="platform-icon">🪟</span>
          <div>
            <div class="platform-name">Windows</div>
            <div class="platform-ext">.msi · 64-bit</div>
          </div>
        </div>
        <span class="download-icon">↓</span>
      </a>

      <a class="platform" id="link-linux" href="#" target="_blank" rel="noopener">
        <div class="platform-info">
          <span class="platform-icon">🐧</span>
          <div>
            <div class="platform-name">Linux</div>
            <div class="platform-ext">.AppImage · 64-bit</div>
          </div>
        </div>
        <span class="download-icon">↓</span>
      </a>
    </div>

    <p class="note">
      <strong>macOS:</strong> If Gatekeeper blocks the app, right-click → Open.<br>
      <strong>Windows:</strong> If SmartScreen appears, click More info → Run anyway.
    </p>
  </div>

  <script>
    // Replace with your own GitHub user/repo
    const REPO = 'YOUR_GITHUB_USERNAME/k_card';
    const API  = `https://api.github.com/repos/${REPO}/releases/latest`;

    fetch(API)
      .then(r => r.json())
      .then(release => {
        document.getElementById('version').textContent = release.tag_name;

        const assets = release.assets;
        const find = (ext) => assets.find(a => a.name.endsWith(ext))?.browser_download_url ?? '#';

        document.getElementById('link-mac').href   = find('.dmg');
        document.getElementById('link-win').href   = find('.msi');
        document.getElementById('link-linux').href = find('.AppImage');
      })
      .catch(() => {
        document.getElementById('version').textContent = 'unavailable';
      });
  </script>
</body>
</html>
